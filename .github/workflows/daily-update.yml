name: Daily Signals Update

on:
  schedule:
    - cron: "0 8 * * 1-5"   # Mon-Fri 8:00 UTC = 4:00 PM Taiwan
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Update signals
        run: python ci_update_signals.py

      - name: Commit changes
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/data/signals.json docs/data/charts/
          git diff --staged --quiet || git commit -m "chore: daily signals update $(date -u +\'%Y-%m-%d\')"
          git push

  notify-failure:
    needs: [update]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord failure alert
        run: >-
          curl -sf -H "Content-Type: application/json"
          -d '{"content": "\ud83d\udd34 ${{ github.repository }} \u2014 ${{ github.workflow }} \u6392\u7a0b\u5931\u6557 \u00b7 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          "${{ secrets.DISCORD_WEBHOOK }}" || true
