<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>台股回測儀表板 · TWSE Backtest</title>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8;
    --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
    --blue: #3b82f6; --purple: #a855f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
  h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .kpi-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .kpi-value { font-size: 1.8rem; font-weight: 700; }
  .pos { color: var(--green); } .neg { color: var(--red); } .neu { color: var(--yellow); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  th { text-align: right; padding: 8px 10px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  th:first-child, th:nth-child(2) { text-align: left; }
  th:hover { color: var(--text); }
  td { padding: 8px 10px; border-bottom: 1px solid #1e293b; text-align: right; white-space: nowrap; }
  td:first-child, td:nth-child(2) { text-align: left; }
  tr:hover td { background: #263148; }
  .bar-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .bar { height: 6px; border-radius: 3px; min-width: 2px; }
  .bar.pos { background: var(--green); }
  .bar.neg { background: var(--red); }
  canvas { max-width: 100%; }
  #chart-wrapper { position: relative; height: 260px; }
  .note { font-size: 0.75rem; color: var(--muted); margin-top: 12px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
  .badge.pos { background: #14532d; color: var(--green); }
  .badge.neg { background: #450a0a; color: var(--red); }
  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 1.1rem; }
  /* Year tabs */
  .year-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .ytab { padding: 4px 12px; border-radius: 99px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all .15s; }
  .ytab:hover { border-color: var(--blue); color: var(--blue); }
  .ytab.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .ytab.pos-year { border-color: #14532d; color: var(--green); }
  .ytab.pos-year.active { background: var(--green); border-color: var(--green); color: #000; }
  .ytab.neg-year { border-color: #450a0a; color: var(--red); }
  .ytab.neg-year.active { background: var(--red); border-color: var(--red); color: #fff; }
  /* Trade table specific */
  .trade-ticker { font-weight: 700; font-size: 0.85rem; }
  .trade-name { color: var(--muted); font-size: 0.78rem; }
  .trade-stats { display: flex; gap: 20px; margin-bottom: 12px; flex-wrap: wrap; }
  .trade-stat { font-size: 0.85rem; }
  .trade-stat span { color: var(--muted); margin-right: 4px; }
  .tbl-scroll { overflow-x: auto; }
  #trade-search { background: #263148; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 6px 12px; font-size: 0.85rem; margin-bottom: 12px; width: 100%; max-width: 300px; }
  #trade-search::placeholder { color: var(--muted); }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<h1>📈 台股量化回測儀表板</h1>
<p class="subtitle">大飆股 DNA 策略 · 2004–2026 年度回測 · 各年獨立起始資金 100 萬</p>

<div id="app"><div class="loading">⏳ 載入回測資料中...</div></div>

<script>
const SUMMARY_URL    = "data/summary.json";
const NAMES_URL      = "data/stock_names.json";
const TRADES_URL     = y => `data/${y}_trades.json`;

let summaryData = [];
let stockNames  = {};
let tradeCache  = {};   // year -> {trades, equity_curve}
let activeYear  = null;

// ── Formatting helpers ──────────────────────────────────────────────────────
function fmt(n, d=1) {
  return n == null ? "—" : (n >= 0 ? "+" : "") + n.toFixed(d) + "%";
}
function fmtMoney(n) {
  if (n == null) return "—";
  const abs = Math.abs(n).toLocaleString("zh-TW", {maximumFractionDigits:0});
  return (n >= 0 ? "+" : "-") + abs;
}
function shortName(full) {
  if (!full) return "";
  return full.replace(/股份有限公司$/, "").replace(/有限公司$/, "").replace(/股份$/, "").trim();
}

// ── Bootstrap ───────────────────────────────────────────────────────────────
async function load() {
  try {
    const [sumRes, nameRes] = await Promise.all([fetch(SUMMARY_URL), fetch(NAMES_URL)]);
    if (!sumRes.ok) throw new Error("summary.json " + sumRes.status);
    summaryData = await sumRes.json();
    if (nameRes.ok) stockNames = await nameRes.json();
  } catch(e) {
    document.getElementById("app").innerHTML =
      `<div class="loading">⚠️ 尚未有回測結果（先執行 <code>python crawler/run_backtest.py</code>）<br><small>${e}</small></div>`;
    return;
  }
  renderSummary();
  // Default: select most recent year with data
  const yr = summaryData[summaryData.length - 1].year;
  loadTradeYear(yr);
}

// ── Summary view ─────────────────────────────────────────────────────────────
function renderSummary() {
  const rows  = summaryData;
  const pos   = rows.filter(r => r.total_return_pct > 0).length;
  const neg   = rows.filter(r => r.total_return_pct <= 0).length;
  const avgRet = rows.reduce((a,r) => a + r.total_return_pct, 0) / rows.length;
  const avgWin = rows.reduce((a,r) => a + r.trade_win_rate, 0) / rows.length;
  const best   = rows.reduce((a,r) => r.total_return_pct > a.total_return_pct ? r : a, rows[0]);
  const worst  = rows.reduce((a,r) => r.total_return_pct < a.total_return_pct ? r : a, rows[0]);
  const totalTrades = rows.reduce((a,r) => a + r.trade_count, 0);

  const kpis = [
    { label:"年均報酬率",  value: fmt(avgRet),  cls: avgRet>=0?"pos":"neg" },
    { label:"正報酬年份",  value: `${pos}/${rows.length}`, cls:"pos" },
    { label:"負報酬年份",  value: `${neg}/${rows.length}`, cls: neg>0?"neg":"pos" },
    { label:"平均勝率",    value: fmt(avgWin),  cls:"neu" },
    { label:"最佳年份",    value: `${best.year} (${fmt(best.total_return_pct)})`, cls:"pos" },
    { label:"最差年份",    value: `${worst.year} (${fmt(worst.total_return_pct)})`, cls:"neg" },
    { label:"總交易次數",  value: totalTrades.toLocaleString(), cls:"neu" },
    { label:"回測期間",    value: `${rows[0].year}–${rows[rows.length-1].year}`, cls:"neu" },
  ];

  let sortKey = "year", sortAsc = true;

  function sortedRows() {
    return [...rows].sort((a,b) => {
      const av = a[sortKey], bv = b[sortKey];
      return sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });
  }

  const maxAbs = Math.max(...rows.map(r => Math.abs(r.total_return_pct)));

  function summaryTableHTML() {
    const hasMissed = rows.some(r => r.missed_count != null);
    const cols = [
      { key:"year",             label:"年份" },
      { key:"total_return_pct", label:"報酬率" },
      { key:"total_pl",         label:"損益 (NT$)" },
      { key:"trade_count",      label:"交易次數" },
      ...(hasMissed ? [{ key:"missed_count", label:"錯過" }] : []),
      { key:"stocks_with_signals", label:"訊號股" },
      { key:"trade_win_rate",   label:"勝率" },
    ];
    const ths = cols.map(c =>
      `<th data-key="${c.key}">${c.label}${sortKey===c.key?(sortAsc?" ▲":" ▼"):""}</th>`
    ).join("");
    const trs = sortedRows().map(r => {
      const ret = r.total_return_pct;
      const barW = Math.round(Math.abs(ret) / maxAbs * 80);
      const cls = ret >= 0 ? "pos" : "neg";
      return `<tr class="sum-row" data-year="${r.year}" style="cursor:pointer">
        <td>${r.year}</td>
        <td><span class="${cls}">${fmt(ret)}</span></td>
        <td style="color:${ret>=0?'var(--green)':'var(--red)'}">
          <div class="bar-wrap">
            <span>${fmtMoney(r.total_pl)}</span>
            <div class="bar ${cls}" style="width:${barW}px"></div>
          </div>
        </td>
        <td>${r.trade_count}</td>
        ${hasMissed ? `<td style="color:var(--yellow)">${r.missed_count ?? "—"}</td>` : ""}
        <td>${r.stocks_with_signals}</td>
        <td><span class="badge ${r.trade_win_rate>=50?'pos':'neg'}">${r.trade_win_rate.toFixed(1)}%</span></td>
      </tr>`;
    }).join("");
    return `<table id="sum-tbl"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  }

  document.getElementById("app").innerHTML = `
    <div class="grid">${kpis.map(k=>`<div class="kpi"><div class="kpi-label">${k.label}</div><div class="kpi-value ${k.cls}">${k.value}</div></div>`).join("")}</div>
    <div class="card">
      <h2>年度報酬率走勢</h2>
      <div id="chart-wrapper"><canvas id="chart"></canvas></div>
    </div>
    <div class="card">
      <h2>年度摘要 <small style="font-size:.75rem;color:var(--muted);font-weight:400">（點選年份查看交易明細）</small></h2>
      <div id="sum-table-wrap">${summaryTableHTML()}</div>
      <p class="note">⚠️ 各年獨立起始資金 100 萬，不複利累積。點擊欄標題排序；點擊列查看該年明細。</p>
    </div>
    <div class="card" id="trade-card">
      <h2 id="trade-title">年度買賣明細</h2>
      <div id="trade-wrap"><div class="loading" style="padding:20px">← 點選上方年份列</div></div>
    </div>
  `;

  function attachSort() {
    document.getElementById("sum-tbl").querySelectorAll("th").forEach(th => {
      th.addEventListener("click", () => {
        const k = th.dataset.key;
        if (sortKey === k) sortAsc = !sortAsc;
        else { sortKey = k; sortAsc = false; }
        document.getElementById("sum-table-wrap").innerHTML = summaryTableHTML();
        attachSort(); attachRowClick();
      });
    });
  }

  function attachRowClick() {
    document.querySelectorAll(".sum-row").forEach(tr => {
      tr.addEventListener("click", () => loadTradeYear(+tr.dataset.year));
    });
  }

  attachSort(); attachRowClick();
  drawChart(rows);
}

// ── Trade detail view ────────────────────────────────────────────────────────
async function loadTradeYear(year) {
  activeYear = year;
  document.getElementById("trade-title").textContent = `${year} 年 買賣明細`;
  document.getElementById("trade-wrap").innerHTML = `<div class="loading" style="padding:20px">⏳ 載入 ${year} 年交易紀錄...</div>`;
  document.getElementById("trade-card").scrollIntoView({behavior:"smooth", block:"start"});

  if (!tradeCache[year]) {
    try {
      const r = await fetch(TRADES_URL(year));
      if (!r.ok) throw new Error(r.status);
      tradeCache[year] = await r.json();
    } catch(e) {
      document.getElementById("trade-wrap").innerHTML = `<div class="loading" style="padding:20px">⚠️ 無法載入 ${year} 年資料<br><small>${e}</small></div>`;
      return;
    }
  }

  renderTrades(year, tradeCache[year].trades || [], tradeCache[year].missed_trades || []);
}

function renderTrades(year, trades, missed) {
  missed = missed || [];
  const sumRow = summaryData.find(r => r.year === year) || {};
  const wins   = trades.filter(t => t.pl > 0).length;
  const losses = trades.filter(t => t.pl <= 0).length;
  const totalPL = trades.reduce((a,t) => a + (t.pl || 0), 0);
  const avgPct  = trades.length ? trades.reduce((a,t) => a + (t.pl_pct || 0), 0) / trades.length : 0;

  let filterText = "";
  let sortKey2 = "buy_date", sortAsc2 = true;
  let showTab = "trades"; // "trades" | "missed"

  function filteredTrades() {
    const q = filterText.trim().toLowerCase();
    const result = q
      ? trades.filter(t =>
          t.ticker.includes(q) ||
          (stockNames[t.ticker] || "").toLowerCase().includes(q) ||
          (t.sell_reason || "").toLowerCase().includes(q)
        )
      : [...trades];
    return result.sort((a,b) => {
      let av = a[sortKey2], bv = b[sortKey2];
      if (av == null) av = ""; if (bv == null) bv = "";
      if (typeof av === "string") return sortAsc2 ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortAsc2 ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });
  }

  function tradeTableHTML() {
    const cols = [
      { key:"ticker",    label:"代號/名稱" },
      { key:"buy_date",  label:"買入日" },
      { key:"sell_date", label:"賣出日" },
      { key:"buy_price", label:"買入價" },
      { key:"sell_price",label:"賣出價" },
      { key:"shares",    label:"股數" },
      { key:"pl",        label:"損益 (NT$)" },
      { key:"pl_pct",    label:"報酬率" },
      { key:"sell_reason", label:"賣出原因" },
    ];
    const ths = cols.map(c =>
      `<th data-col="${c.key}">${c.label}${sortKey2===c.key?(sortAsc2?" ▲":" ▼"):""}</th>`
    ).join("");

    const rows = filteredTrades();
    const trs = rows.map(t => {
      const name  = shortName(stockNames[t.ticker] || "");
      const cls   = t.pl >= 0 ? "pos" : "neg";
      return `<tr>
        <td><div class="trade-ticker">${t.ticker}</div><div class="trade-name">${name}</div></td>
        <td>${t.buy_date}</td>
        <td>${t.sell_date}</td>
        <td>${t.buy_price != null ? t.buy_price.toFixed(2) : "—"}</td>
        <td>${t.sell_price != null ? t.sell_price.toFixed(2) : "—"}</td>
        <td>${t.shares != null ? t.shares.toLocaleString() : "—"}</td>
        <td class="${cls}">${fmtMoney(t.pl)}</td>
        <td><span class="badge ${cls}">${t.pl_pct != null ? fmt(t.pl_pct) : "—"}</span></td>
        <td style="color:var(--muted);font-size:.78rem">${t.sell_reason || ""}</td>
      </tr>`;
    }).join("");

    return `
      <table id="trade-tbl">
        <thead><tr>${ths}</tr></thead>
        <tbody>${trs}</tbody>
      </table>
      <p class="note" style="margin-top:8px">顯示 ${rows.length} / ${trades.length} 筆交易</p>
    `;
  }

  function missedTableHTML() {
    const q = filterText.trim().toLowerCase();
    const rows = q
      ? missed.filter(m => m.ticker.includes(q) || (stockNames[m.ticker]||"").toLowerCase().includes(q))
      : missed;
    if (!rows.length) return `<p style="color:var(--muted);padding:12px">無錯過的訊號</p>`;
    return `<div class="tbl-scroll"><table>
      <thead><tr>
        <th style="text-align:left">代號/名稱</th>
        <th style="text-align:right">日期</th>
        <th style="text-align:right">價格</th>
        <th style="text-align:right">評分</th>
        <th style="text-align:right">突破幅%</th>
        <th style="text-align:left">原因</th>
      </tr></thead>
      <tbody>${rows.map(m => `<tr>
        <td><div class="trade-ticker">${m.ticker}</div><div class="trade-name">${shortName(stockNames[m.ticker]||"")}</div></td>
        <td>${m.date}</td>
        <td>${m.price != null ? m.price.toFixed(2) : "—"}</td>
        <td>${m.score}</td>
        <td>${m.breakout_pct != null ? m.breakout_pct.toFixed(2)+"%" : "—"}</td>
        <td style="color:var(--muted);font-size:.78rem">${m.reason||""}</td>
      </tr>`).join("")}</tbody>
    </table>
    <p class="note" style="margin-top:8px">顯示 ${rows.length} 筆錯過訊號</p></div>`;
  }

  const statsHTML = `
    <div class="trade-stats">
      <div class="trade-stat"><span>交易筆數</span>${trades.length}</div>
      <div class="trade-stat"><span>獲利</span><span class="pos">${wins}</span></div>
      <div class="trade-stat"><span>虧損</span><span class="neg">${losses}</span></div>
      <div class="trade-stat"><span>總損益</span><span class="${totalPL>=0?'pos':'neg'}">${fmtMoney(totalPL)}</span></div>
      <div class="trade-stat"><span>平均報酬率</span><span class="${avgPct>=0?'pos':'neg'}">${fmt(avgPct)}</span></div>
      <div class="trade-stat"><span>勝率</span>${trades.length ? (wins/trades.length*100).toFixed(1)+"%" : "—"}</div>
      <div class="trade-stat"><span>錯過訊號</span><span style="color:var(--yellow)">${missed.length}</span></div>
    </div>
  `;

  document.getElementById("trade-wrap").innerHTML = `
    ${statsHTML}
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button id="tab-trades" class="ytab active" onclick="switchTab('trades')">交易明細 (${trades.length})</button>
      <button id="tab-missed" class="ytab neg-year" onclick="switchTab('missed')">錯過訊號 (${missed.length})</button>
    </div>
    <input id="trade-search" type="text" placeholder="搜尋代號/名稱/原因...">
    <div id="trade-tbl-wrap">${tradeTableHTML()}</div>
  `;

  function attachTradeSort() {
    document.getElementById("trade-tbl").querySelectorAll("th").forEach(th => {
      th.addEventListener("click", () => {
        const k = th.dataset.col;
        if (sortKey2 === k) sortAsc2 = !sortAsc2;
        else { sortKey2 = k; sortAsc2 = false; }
        document.getElementById("trade-tbl-wrap").innerHTML = tradeTableHTML();
        attachTradeSort();
      });
    });
  }

  document.getElementById("trade-search").addEventListener("input", e => {
    filterText = e.target.value;
    document.getElementById("trade-tbl-wrap").innerHTML =
      showTab === "trades" ? tradeTableHTML() : missedTableHTML();
    if (showTab === "trades") attachTradeSort();
  });

  window.switchTab = function(tab) {
    showTab = tab;
    document.getElementById("tab-trades").classList.toggle("active", tab === "trades");
    document.getElementById("tab-missed").classList.toggle("active", tab === "missed");
    document.getElementById("trade-tbl-wrap").innerHTML =
      tab === "trades" ? tradeTableHTML() : missedTableHTML();
    if (tab === "trades") attachTradeSort();
  };

  attachTradeSort();
}

// ── Bar chart ────────────────────────────────────────────────────────────────
function drawChart(rows) {
  const canvas = document.getElementById("chart");
  const W = canvas.parentElement.clientWidth;
  const H = 260;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  const pad = { l:55, r:20, t:20, b:30 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  const vals = rows.map(r => r.total_return_pct);
  const maxV = Math.max(...vals, 5);
  const minV = Math.min(...vals, -5);
  const range = maxV - minV || 1;

  function fy(v) { return pad.t + ch * (1 - (v - minV) / range); }
  function fx(i) { return pad.l + (i / (rows.length - 1)) * cw; }

  const zy = fy(0);
  ctx.strokeStyle = "#334155"; ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(pad.l, zy); ctx.lineTo(pad.l+cw, zy); ctx.stroke();
  ctx.setLineDash([]);

  const bw = Math.max(4, cw / rows.length - 3);
  rows.forEach((r, i) => {
    const x = fx(i) - bw/2;
    const v = r.total_return_pct;
    const y1 = fy(Math.max(v,0));
    const y2 = fy(Math.min(v,0));
    ctx.fillStyle = v >= 0 ? "rgba(34,197,94,0.8)" : "rgba(239,68,68,0.8)";
    ctx.fillRect(x, Math.min(y1,y2), bw, Math.abs(y1-y2) || 2);
  });

  ctx.fillStyle = "#64748b"; ctx.font = "11px system-ui"; ctx.textAlign = "center";
  rows.forEach((r, i) => {
    if (i % 2 === 0 || rows.length <= 10)
      ctx.fillText(r.year, fx(i), H - 8);
  });

  ctx.textAlign = "right";
  [-20,-10,0,10,20,30,50,100,200].forEach(v => {
    if (v < minV - 5 || v > maxV + 5) return;
    const y = fy(v);
    ctx.fillStyle = "#64748b";
    ctx.fillText(v + "%", pad.l - 6, y + 4);
    ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+cw, y); ctx.stroke();
  });
}

load();
</script>
</body>
</html>
